<!DOCTYPE html>
<html>
<head>
    <title>Fibonacci Series</title>
</head>
<body>

<h2>Fibonacci Series Generate</h2>

<label>Enter number of terms:</label>
<input type="number" id="terms"><br><br>

<button onclick="generateFibonacci()">Generate</button>

<h3 id="result"></h3>

<script>
function generateFibonacci() {
    let n = document.getElementById("terms").value;
    n = parseInt(n);

    let fib = [];
    fib[0] = 0;
    fib[1] = 1;

    for (let i = 2; i < n; i++) {
        fib[i] = fib[i - 1] + fib[i - 2];
    }

    document.getElementById("result").innerHTML = "Series: " + fib.slice(0, n).join(", ");
}
</script>

</body>
</html>
